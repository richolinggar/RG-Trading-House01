<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RG Trading House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-login { background: radial-gradient(circle at bottom right, #e0f2fe 0%, #ffffff 100%); }
    </style>
</head>
<body class="bg-login min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-black text-2xl mx-auto mb-4 shadow-lg shadow-blue-500/30">RG</div>
            <h1 class="text-2xl font-bold text-gray-900">Welcome Back, Trader!</h1>
            <p class="text-gray-500 text-sm mt-2">Login ke ekosistem RG Trading House</p>
        </div>

        <!-- Tombol Login Google -->
        <button onclick="simulasiLogin()" class="w-full bg-white border-2 border-gray-200 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-3 mb-6 shadow-sm">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
            Lanjutkan dengan Google
        </button>

        <!-- Garis Pemisah -->
        <div class="flex items-center gap-4 mb-6">
            <hr class="flex-1 border-gray-200">
            <span class="text-xs text-gray-400 font-semibold uppercase">Atau dengan Email</span>
            <hr class="flex-1 border-gray-200">
        </div>

        <!-- Form Email Biasa -->
        <form onsubmit="event.preventDefault(); simulasiLogin();" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" placeholder="nama@email.com" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition font-medium" required>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="#" class="text-xs text-blue-600 hover:underline font-semibold">Lupa Password?</a>
                </div>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-800 transition shadow-lg shadow-blue-600/30 mt-2">
                Masuk ke Dashboard
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8 font-medium">
            Belum punya akun? <a href="pricing.html" class="text-blue-600 font-bold hover:underline">Daftar & Langganan</a>
        </p>

    </div>

    <!-- Script Simulasi (Nanti diganti dengan Firebase Auth) -->
    <script>
        function simulasiLogin() {
            // Dalam sistem asli, kode ini akan mengecek password ke database.
            // Untuk sekarang, kita arahkan langsung ke Dashboard.
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
