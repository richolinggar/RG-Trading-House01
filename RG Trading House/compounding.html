<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calculator | RG Trading House</title>
    <!-- Memanggil Tailwind CSS untuk desain instan -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1565C0', success: '#00C853' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Background gradien yang menuju ke tengah dan sangat smooth */
        .bg-smooth-radial {
            background: radial-gradient(circle at center, #ffffff 0%, #e3f2fd 120%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #F3F4F6;
            box-shadow: 0 10px 25px -5px rgba(21, 101, 192, 0.1);
        }
    </style>
</head>
<body class="bg-smooth-radial min-h-screen text-gray-800 p-6">

    <!-- Tombol Kembali ke Halaman Utama -->
    <div class="max-w-3xl mx-auto mb-8 mt-4">
        <a href="index.html" class="text-primary hover:text-blue-800 font-semibold flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <!-- Kotak Kalkulator -->
    <div class="max-w-3xl mx-auto glass-card rounded-2xl p-8">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 bg-primary text-white rounded-lg flex items-center justify-center text-xl shadow-lg">
                <i class="fas fa-calculator"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Simulasi Compounding</h1>
                <p class="text-gray-500 text-sm">Hitung proyeksi pertumbuhan modal trading Anda.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Kolom Input -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Modal Awal ($)</label>
                <input type="number" id="modalAwal" value="1000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Contoh: 1000">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Target Profit per Bulan (%)</label>
                <input type="number" id="persenProfit" value="5" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Contoh: 5">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Durasi Trading (Bulan)</label>
                <input type="number" id="durasiBulan" value="12" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Contoh: 12">
            </div>
        </div>

        <button onclick="hitungCompounding()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition shadow-lg">
            Hitung Proyeksi
        </button>

        <!-- Kotak Hasil (Awalnya disembunyikan) -->
        <div id="kotakHasil" class="mt-8 p-6 bg-blue-50 border border-blue-100 rounded-xl hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4 text-center">Hasil Proyeksi Anda</h2>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-white p-4 rounded-lg shadow-sm">
                    <p class="text-sm text-gray-500 font-semibold">Total Modal Akhir</p>
                    <p class="text-2xl font-bold text-success" id="hasilAkhir">$0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-sm">
                    <p class="text-sm text-gray-500 font-semibold">Total Profit Bersih</p>
                    <p class="text-2xl font-bold text-primary" id="hasilProfit">$0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Mesin Logika Kalkulator (JavaScript Ringan) -->
    <script>
        function hitungCompounding() {
            // Mengambil angka yang diketik oleh user
            let modal = parseFloat(document.getElementById('modalAwal').value);
            let persen = parseFloat(document.getElementById('persenProfit').value) / 100;
            let bulan = parseInt(document.getElementById('durasiBulan').value);

            // Rumus Compounding
            let modalAkhir = modal * Math.pow((1 + persen), bulan);
            let totalProfit = modalAkhir - modal;

            // Menampilkan hasil ke layar
            document.getElementById('hasilAkhir').innerText = "$" + modalAkhir.toFixed(2);
            document.getElementById('hasilProfit').innerText = "$" + totalProfit.toFixed(2);
            
            // Memunculkan kotak hasil
            document.getElementById('kotakHasil').classList.remove('hidden');
        }
    </script>
</body>
</html>
